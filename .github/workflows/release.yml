name: Release extension zip

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
      - manifest.json
      - background.js
      - content.js
      - popup.html
      - popup.js
      - README.md
      - PRIVACY.md
      - LICENSE
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          zip -r dianping-favorites-exporter-local-v0.1.0.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js \
            README.md \
            PRIVACY.md \
            LICENSE

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.1.0 >/dev/null 2>&1; then
            gh release upload v0.1.0 dianping-favorites-exporter-local-v0.1.0.zip --clobber
          else
            gh release create v0.1.0 dianping-favorites-exporter-local-v0.1.0.zip \
              --title "v0.1.0" \
              --notes "Initial local Chrome extension release."
          fi
